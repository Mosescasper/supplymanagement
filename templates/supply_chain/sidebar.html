<aside class="sidebar">
  <div class="sidebar-logo">
    <svg viewBox="0 0 28 28" fill="none">
      <rect x="2" y="10" width="24" height="14" rx="2" stroke="#5FCB7A" stroke-width="2"/>
      <path d="M2 10L14 3L26 10" stroke="#5FCB7A" stroke-width="2" stroke-linejoin="round"/>
      <path d="M14 3V17" stroke="#5FCB7A" stroke-width="2"/>
    </svg>
    <span>SupplyLink</span>
  </div>

  <div class="sidebar-portal-tag">Supply Chain</div>

  <nav class="sidebar-nav">
    <a href="{{ url_for('supply_chain_dashboard') }}" class="nav-item {{ 'active' if request.path == url_for('supply_chain_dashboard') }}">
      <svg viewBox="0 0 24 24" fill="none"><rect x="3" y="3" width="8" height="8" rx="1.5" stroke="currentColor" stroke-width="1.8"/><rect x="13" y="3" width="8" height="5" rx="1.5" stroke="currentColor" stroke-width="1.8"/><rect x="13" y="11" width="8" height="10" rx="1.5" stroke="currentColor" stroke-width="1.8"/><rect x="3" y="14" width="8" height="7" rx="1.5" stroke="currentColor" stroke-width="1.8"/></svg>
      <span>Dashboard</span>
    </a>
    <a href="#" class="nav-item">
      <svg viewBox="0 0 24 24" fill="none"><path d="M3 8.5 12 4l9 4.5v7L12 20l-9-4.5z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/><path d="M3 8.5 12 13l9-4.5M12 13v7" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/></svg>
      <span>Inventory</span>
    </a>
    <a href="#" class="nav-item">
      <svg viewBox="0 0 24 24" fill="none"><path d="M4 20V10.5L12 4l8 6.5V20" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/><path d="M9.5 20v-6h5v6" stroke="currentColor" stroke-width="1.8"/></svg>
      <span>Suppliers</span>
    </a>
    <a href="#" class="nav-item">
      <svg viewBox="0 0 24 24" fill="none"><rect x="3" y="4" width="18" height="16" rx="1.8" stroke="currentColor" stroke-width="1.8"/><path d="M3 9.5h18" stroke="currentColor" stroke-width="1.8"/><path d="M8 13h3M8 16.5h6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
      <span>Purchase Orders</span>
    </a>
    <a href="{{ url_for('my_requisitions') }}" class="nav-item {{ 'active' if request.path == url_for('my_requisitions') }}">
      <svg viewBox="0 0 24 24" fill="none"><path d="M5 3h9l5 5v13H5z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/><path d="M14 3v5h5" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/><path d="M8.5 13h7M8.5 16.5h7" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
      <span>Requisitions</span>
    </a>
    <a href="#" class="nav-item">
      <svg viewBox="0 0 24 24" fill="none"><path d="M4 19V5M4 19h16M8 15v-4M12.5 15V8M17 15v-6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
      <span>Reports</span>
    </a>
  </nav>

  <div class="sidebar-footer">
    <div class="sidebar-user">
      <div class="sidebar-user-avatar">{{ current_user.name[:1] if current_user.is_authenticated else "?" }}</div>
      <div class="sidebar-user-info">
        <span class="sidebar-user-name">{{ current_user.name if current_user.is_authenticated else "Guest" }}</span>
        <span class="sidebar-user-role">Supply Chain</span>
      </div>
    </div>
    <a href="{{ url_for('logout') }}" class="nav-item logout-item">
      <svg viewBox="0 0 24 24" fill="none"><path d="M15 4H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h8" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/><path d="M10 12h11m0 0-3.5-3.5M21 12l-3.5 3.5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
      <span>Log out</span>
    </a>
  </div>
</aside>
